<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sabor — Sistema Web del Restaurante</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

<style>
  :root{
    --bg:#0c0a0a;--bg-2:#141010;--panel:#1a1413;--panel-2:#221a18;--line:#332724;
    --text:#f5ede6;--muted:#a8978d;--faint:#6f5f57;--accent:#ff7a18;--accent-2:#ffb547;
    --green:#34d399;--red:#f87171;--yellow:#fbbf24;--radius:18px;
    --shadow:0 18px 50px -20px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%, #1c1310 0%, var(--bg) 55%);color:var(--text);
    font-family:"Segoe UI",Roboto,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  img{display:block;max-width:100%}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px}
  .topbar{position:sticky;top:0;z-index:60;backdrop-filter:blur(14px);background:rgba(12,10,10,.72);border-bottom:1px solid var(--line)}
  .topbar .wrap{display:flex;align-items:center;gap:14px;height:62px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px;font-size:19px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 16px var(--accent)}
  .brand small{font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  .spacer{flex:1}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px}
  .seg button{padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);transition:.18s}
  .seg button.active{background:linear-gradient(135deg,var(--accent),#ff9a3d);color:#1a0e06}
  .cart-btn{position:relative;width:44px;height:44px;border-radius:12px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;font-size:19px}
  .cart-btn .badge{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#190d04;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:999px;display:grid;place-items:center;padding:0 5px}
  .banner{position:relative;margin-top:18px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)}
  .banner .bg{height:230px;background:linear-gradient(120deg,#2b1206,#5a2a0c 45%,#1a0f08);position:relative}
  .banner .bg::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 80% 120%,rgba(255,122,24,.35),transparent 70%)}
  .banner .inner{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:26px;z-index:2}
  .banner h1{font-size:34px;font-weight:800;letter-spacing:-.5px;text-shadow:0 2px 20px rgba(0,0,0,.6)}
  .banner p{color:#f3d9c6;max-width:520px;margin-top:4px}
  .open-pill{align-self:flex-start;margin-bottom:10px;display:inline-flex;align-items:center;gap:7px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.4);color:var(--green);font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px}
  .open-pill .blink{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.6s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .stories{display:flex;gap:14px;overflow-x:auto;padding:20px 2px 4px;scrollbar-width:none}
  .stories::-webkit-scrollbar{display:none}
  .story{flex:0 0 auto;width:72px;text-align:center}
  .story .ring{width:72px;height:72px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent-2));cursor:pointer}
  .story .ring .face{width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);display:grid;place-items:center;font-size:26px;background:var(--panel-2);overflow:hidden}
  .story .ring .face img,.story .ring .face video{width:100%;height:100%;object-fit:cover}
  .story span{display:block;margin-top:6px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sec-head{display:flex;align-items:end;justify-content:space-between;margin:26px 0 14px}
  .sec-head h2{font-size:22px;font-weight:800;letter-spacing:-.3px}
  .sec-head .cats{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:12.5px;font-weight:600;transition:.15s}
  .chip.active{background:var(--accent);color:#1a0e06;border-color:transparent}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.22s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);border-color:#4a3a35;box-shadow:var(--shadow)}
  .media{position:relative;aspect-ratio:1/1;overflow:hidden;background:linear-gradient(135deg,#2a1a12,#3d2417)}
  .media .ph{position:absolute;inset:0;display:grid;place-items:center;font-size:62px}
  .media video,.media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .media .fade{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,10,10,.85),transparent 55%)}
  .tag{position:absolute;top:10px;left:10px;z-index:3;font-size:11px;font-weight:800;padding:4px 9px;border-radius:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
  .tag.low{background:rgba(251,191,36,.92);color:#3a2600}
  .tag.out{background:rgba(248,113,113,.92);color:#3a0606}
  .card-body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:6px;flex:1}
  .card-body h3{font-size:16px;font-weight:700}
  .card-body .desc{font-size:12.5px;color:var(--muted);flex:1}
  .card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .price{font-size:18px;font-weight:800;color:var(--accent-2)}
  .add{background:linear-gradient(135deg,var(--accent),#ff9a3d);color:#1a0e06;font-weight:800;font-size:13px;padding:9px 14px;border-radius:11px;transition:.15s}
  .add:hover{filter:brightness(1.08)}
  .add:disabled{background:var(--panel-2);color:var(--faint);cursor:not-allowed}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;pointer-events:none;transition:.25s}
  .overlay.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,100%);background:var(--bg-2);border-left:1px solid var(--line);z-index:100;transform:translateX(100%);transition:.32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer header{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line)}
  .drawer header h3{font-size:18px;font-weight:800}
  .x{width:36px;height:36px;border-radius:10px;background:var(--panel);display:grid;place-items:center;font-size:18px;color:var(--muted)}
  .drawer .body{flex:1;overflow-y:auto;padding:16px}
  .drawer .foot{padding:16px 18px;border-top:1px solid var(--line);background:var(--bg)}
  .citem{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
  .citem .thumb{width:52px;height:52px;border-radius:12px;background:var(--panel-2);display:grid;place-items:center;font-size:24px;flex:0 0 auto;overflow:hidden}
  .citem .thumb img,.citem .thumb video{width:100%;height:100%;object-fit:cover}
  .citem .ci-info{flex:1;min-width:0}
  .citem .ci-info b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .citem .ci-info span{font-size:12.5px;color:var(--muted)}
  .qty{display:flex;align-items:center;gap:8px}
  .qty button{width:28px;height:28px;border-radius:8px;background:var(--panel);border:1px solid var(--line);font-size:16px;display:grid;place-items:center}
  .qty b{min-width:18px;text-align:center}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .ico{font-size:44px;margin-bottom:10px;opacity:.6}
  label.fld{display:block;margin-bottom:13px}
  label.fld .lab{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
  .input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14.5px;transition:.15s}
  .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,122,24,.15)}
  textarea.input{resize:vertical;min-height:64px}
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:4px}
  .slot{padding:10px;border-radius:11px;border:1px solid var(--line);background:var(--panel);text-align:center;font-size:13px;font-weight:600;transition:.15s}
  .slot small{display:block;font-size:10.5px;color:var(--muted);font-weight:500;margin-top:2px}
  .slot.active{border-color:var(--accent);background:rgba(255,122,24,.12);color:var(--accent-2)}
  .slot.full{opacity:.4;cursor:not-allowed;text-decoration:line-through}
  .pay-opts{display:grid;gap:9px;margin-top:4px}
  .pay{display:flex;align-items:center;gap:12px;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--panel);transition:.15s}
  .pay.active{border-color:var(--accent);background:rgba(255,122,24,.1)}
  .pay .logo{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:13px;color:#fff;flex:0 0 auto}
  .pay .logo.yape{background:#742284}.pay .logo.plin{background:#00b3a4}.pay .logo.cash{background:#3f7a3f;font-size:20px}
  .pay .meta{flex:1;text-align:left}.pay .meta b{font-size:14.5px}.pay .meta span{display:block;font-size:12px;color:var(--muted)}
  .pay .chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--line)}
  .pay.active .chk{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px var(--bg-2)}
  #map{height:200px;border-radius:13px;border:1px solid var(--line);margin-top:4px;z-index:1}
  .map-hint{font-size:11.5px;color:var(--faint);margin-top:6px}
  .btn{width:100%;padding:14px;border-radius:13px;font-weight:800;font-size:15px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#ff9a3d);color:#1a0e06}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .btn-wa{background:#25d366;color:#042b12}
  .btn-ghost{background:var(--panel);border:1px solid var(--line);color:var(--text)}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .total-row span{color:var(--muted)}.total-row .big{font-size:24px;font-weight:800;color:var(--accent-2)}
  .yape-box{margin-top:4px;background:var(--panel);border:1px dashed var(--accent);border-radius:13px;padding:14px;text-align:center}
  .yape-box .num{font-size:22px;font-weight:900;letter-spacing:1px;color:var(--accent-2);margin:4px 0}
  .yape-box small{color:var(--muted);font-size:12px}
  .admin-tabs{display:flex;gap:6px;overflow-x:auto;padding:18px 0 4px;scrollbar-width:none}
  .admin-tabs::-webkit-scrollbar{display:none}
  .atab{flex:0 0 auto;padding:9px 15px;border-radius:11px;background:var(--panel);border:1px solid var(--line);font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap}
  .atab.active{background:var(--accent);color:#1a0e06;border-color:transparent}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px}
  .panel h3{font-size:17px;font-weight:800;margin-bottom:4px}
  .panel .sub{font-size:13px;color:var(--muted);margin-bottom:16px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:9px 10px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.ok{background:rgba(52,211,153,.15);color:var(--green)}.pill.wait{background:rgba(251,191,36,.15);color:var(--yellow)}.pill.no{background:rgba(248,113,113,.15);color:var(--red)}
  .mini{padding:6px 11px;border-radius:9px;font-size:12px;font-weight:700}
  .mini.green{background:var(--green);color:#042b12}.mini.red{background:var(--red);color:#3a0606}.mini.ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--muted)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px}
  .stat .n{font-size:26px;font-weight:800}.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .qr-area{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
  #qrcode{background:#fff;padding:14px;border-radius:14px;width:max-content}
  #qrcode img,#qrcode canvas{display:block}
  .login-card{max-width:380px;margin:60px auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow)}
  .login-card .ico{font-size:40px;text-align:center;margin-bottom:10px}
  .login-card h2{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}
  .login-card p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:13px 20px;border-radius:13px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.3s;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
  footer{color:var(--faint);font-size:12px;text-align:center;padding:40px 0 50px}
  .countdown{text-align:center;padding:30px 0}
  .countdown .time{font-size:54px;font-weight:800;color:var(--accent-2);font-variant-numeric:tabular-nums;letter-spacing:1px}
  .countdown .ring2{width:150px;height:150px;margin:0 auto 14px;border-radius:50%;background:conic-gradient(var(--accent) var(--deg,0deg),var(--line) 0);display:grid;place-items:center}
  .countdown .ring2 .in{width:124px;height:124px;border-radius:50%;background:var(--bg-2);display:grid;place-items:center;font-size:42px}
  .loader{text-align:center;padding:60px 20px;color:var(--muted)}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .upbar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:6px}
  .upbar i{display:block;height:100%;width:0;background:var(--accent);transition:.2s}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="brand"><span class="dot"></span>
      <div><div id="brandName">Sabor</div><small>Menú del día</small></div>
    </div>
    <div class="spacer"></div>
    <div class="seg">
      <button id="navCliente" class="active" onclick="setView('cliente')">Cliente</button>
      <button id="navAdmin" onclick="setView('admin')">Admin</button>
    </div>
    <button class="cart-btn" id="cartBtn" onclick="openCart()">🛒<span class="badge hidden" id="cartBadge">0</span></button>
  </div>
</div>

<!-- VISTA CLIENTE -->
<div id="viewCliente">
  <div class="wrap">
    <div class="banner"><div class="bg"><div class="inner">
      <span class="open-pill"><span class="blink"></span> Abierto ahora · cocina lista</span>
      <h1 id="bnTitle">Sabor</h1>
      <p id="bnSub">Cargando menú…</p>
    </div></div></div>
    <div class="stories" id="storiesBar"></div>
    <div class="sec-head"><h2>Menú del día</h2><div class="cats" id="cats"></div></div>
    <div id="menuGrid"><div class="loader"><div class="spin"></div>Cargando platos…</div></div>
    <footer id="cliFoot">Sistema Web para Restaurante</footer>
  </div>
</div>

<!-- VISTA ADMIN -->
<div id="viewAdmin" class="hidden">
  <div class="wrap">
    <div id="adminLogin">
      <div class="login-card">
        <div class="ico">🔐</div>
        <h2>Panel de administración</h2>
        <p>Acceso solo para el dueño del restaurante</p>
        <label class="fld"><span class="lab">Email</span>
          <input class="input" type="email" id="adminEmail" placeholder="tu@correo.com" autocomplete="username"></label>
        <label class="fld"><span class="lab">Contraseña</span>
          <input class="input" type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></label>
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Entrar</button>
      </div>
    </div>
    <div id="adminPanel" class="hidden">
      <div class="admin-tabs" id="adminTabs"></div>
      <div id="adminContent"></div>
      <footer>Panel admin · conectado a Supabase</footer>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <header><h3 id="drawerTitle">Tu pedido</h3><button class="x" onclick="closeDrawer()">✕</button></header>
  <div class="body" id="drawerBody"></div>
  <div class="foot" id="drawerFoot"></div>
</div>
<div class="toast" id="toast"></div>

<!-- librerías -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- backend -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>

<script>
let CONFIG = { nombre:"Sabor", subtitulo:"", whatsapp:"51999888777", yape:"", plin:"",
  titularPago:"", capacidadPorFranja:4, lat:-12.0651, lng:-75.2049 };
let platos=[], stories=[], configQR=[], pedidos=[];
let carrito=[], catFiltro="todos";
let checkout={franja:null,metodoPago:null,operacion:"",nombre:"",tel:"",lat:null,lng:null,conteo:{}};
let map=null, marker=null, adminLogged=false, adminTab="resumen", rtSub=null;

const $=(s)=>document.querySelector(s);
const money=(n)=>"S/. "+Number(n||0).toFixed(2);
function toast(m){const t=$("#toast");t.innerHTML=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),3000);}
const CATS={todos:"Todos",desayuno:"Desayunos",entrada:"Entradas",almuerzo:"Almuerzos",cena:"Cenas",bebida:"Bebidas",postre:"Postres"};

const mapPlato=(r)=>({id:r.id,nombre:r.nombre,desc:r.descripcion||"",precio:Number(r.precio),categoria:r.categoria,
  emoji:r.emoji||"🍽️",stock:r.stock,activo:r.activo,archivo_url:r.archivo_url,tipo_archivo:r.tipo_archivo});
const mapStory=(r)=>({id:r.id,emoji:r.emoji||"📸",texto:r.texto_descripcion||"",archivo_url:r.archivo_url,tipo_archivo:r.tipo_archivo});
const mapPedido=(r)=>({id:r.id,num:r.numero_pedido,cliente:r.cliente_nombre,tel:r.cliente_telefono,items:r.items||[],
  total:Number(r.total),franja:r.franja_horaria,metodoPago:r.metodo_pago,operacion:r.operacion_pago||"—",
  estadoPago:r.estado_pago,estado:r.estado,lat:r.latitud_entrega,lng:r.longitud_entrega});
function mapConfig(c){return {nombre:c.nombre,subtitulo:c.subtitulo||"",whatsapp:c.whatsapp||"",yape:c.yape||"",
  plin:c.plin||"",titularPago:c.titular_pago||"",capacidadPorFranja:c.capacidad_por_franja||4,
  lat:Number(c.lat)||-12.0651,lng:Number(c.lng)||-75.2049};}

const esVideo=(t)=>t==="mp4"||t==="webm"||t==="mov";
function mediaHTML(url,tipo,fallback){
  if(!url) return `<div class="ph">${fallback||"🍽️"}</div>`;
  if(esVideo(tipo)) return `<video src="${url}" autoplay muted loop playsinline></video>`;
  return `<img src="${url}" alt="" loading="lazy">`;
}

function generarFranjas(conteo){
  const out=[];
  for(let h=12;h<21;h++)for(let m=0;m<60;m+=15){
    const ini=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    let m2=m+15,h2=h; if(m2>=60){m2=0;h2=h+1;}
    const fin=`${String(h2).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
    const etq=`${ini}-${fin}`, ocup=conteo[etq]||0;
    out.push({etq,ini,ocup,lleno:ocup>=CONFIG.capacidadPorFranja});
  }
  return out;
}

function initMap(){
  if(!$("#map"))return; if(map){map.remove();map=null;}
  const lat=checkout.lat||CONFIG.lat,lng=checkout.lng||CONFIG.lng;
  map=L.map('map',{attributionControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  marker=L.marker([lat,lng],{draggable:true}).addTo(map);
  const set=(ll)=>{checkout.lat=ll.lat;checkout.lng=ll.lng;validarCheckout();};
  set(marker.getLatLng());
  marker.on('dragend',()=>set(marker.getLatLng()));
  map.on('click',(e)=>{marker.setLatLng(e.latlng);set(e.latlng);});
  setTimeout(()=>map.invalidateSize(),120);
}

function abrirWhatsApp(ped){
  const maps=`https://www.google.com/maps?q=${ped.lat},${ped.lng}`;
  const pago=ped.metodoPago==='efectivo'?"Pago: Efectivo contra entrega":`Pago: ${ped.metodoPago.toUpperCase()} · Op. N° ${ped.operacion} (por verificar)`;
  let t=`*NUEVO PEDIDO #${ped.num}*\n\n`;
  ped.items.forEach(i=>{t+=`${i.cant}x ${i.nombre} - ${money(i.precio*i.cant)}\n`;});
  t+=`\nHora de entrega: ${ped.franja}\nCliente: ${ped.cliente} (${ped.tel})\n${pago}\nUbicación: ${maps}\n\n*Total: ${money(ped.total)}*`;
  window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(t)}`,"_blank");
}

      <div class="total-row"><span>Total</span><span class="big">${money(ped.total)}</span></div></div>`;
  $("#drawerFoot").innerHTML=`<button class="btn btn-wa" onclick='abrirWhatsApp(${JSON.stringify(ped)})'>Abrir WhatsApp 📲</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="closeDrawer()">Listo</button>`;
  const tick=()=>{const cd=$("#cd");if(!cd)return;
    cd.textContent=`${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;

      <label class="fld"><span class="lab">Stock (vacío = ilimitado)</span><input class="input" id="npStock" type="number" inputmode="numeric" placeholder="5"></label></div>
    <label class="fld"><span class="lab">Descripción</span><textarea class="input" id="npDesc" placeholder="Ingredientes y detalles..."></textarea></label>
    <div class="row2"><label class="fld"><span class="lab">Archivo de Canva (mp4/jpg/png/gif)</span><input class="input" id="npFile" type="file" accept="video/mp4,image/*"></label>
      <label class="fld"><span class="lab">Emoji (respaldo)</span><input class="input" id="npEmoji" placeholder="🍲" maxlength="2"></label></div>
    <div class="upbar" id="upbar" style="display:none"><i id="upbarI"></i></div>
    <button class="btn btn-primary" id="btnAddPlato" onclick="addPlato()" style="margin-top:10px">+ Publicar plato</button></div>
    <div class="panel"><h3>Platos publicados (${platos.length})</h3>
    <table><thead><tr><th></th><th>Plato</th><th>Precio</th><th>Stock</th><th>Estado</th><th></th></tr></thead><tbody>
    ${platos.map(p=>`<tr><td style="width:46px">${p.archivo_url?`<div class="thumb" style="width:40px;height:40px;border-radius:9px;overflow:hidden">${mediaHTML(p.archivo_url,p.tipo_archivo,p.emoji)}</div>`:`<span style="font-size:22px">${p.emoji}</span>`}</td>
      <td><b>${p.nombre}</b><br><span style="color:var(--faint);font-size:11px">${CATS[p.categoria]||p.categoria}</span></td>
      <td>${money(p.precio)}</td>
      <td><div class="qty" style="justify-content:flex-start"><button onclick="setStock('${p.id}',-1)">−</button><b>${p.stock===null?'∞':p.stock}</b><button onclick="setStock('${p.id}',1)">+</button></div></td>
      <td><span class="pill ${p.activo?'ok':'no'}">${p.activo?'visible':'oculto'}</span></td>
      <td><button class="mini ghost" onclick="toggleActivo('${p.id}',${p.activo})">${p.activo?'ocultar':'mostrar'}</button> <button class="mini red" onclick="delPlato('${p.id}')">borrar</button></td></tr>`).join("")}
    </tbody></table></div>`;
}
async function addPlato(){
  const nombre=$("#npNombre").value.trim(); if(!nombre)return toast("Falta el nombre");
  const btn=$("#btnAddPlato"); btn.disabled=true; btn.textContent="Publicando…";
  try{
    let archivo_url=null,tipo_archivo=null;
    const f=$("#npFile").files[0];
    if(f){
      $("#upbar").style.display="block";
      const r=await db.subirMedia(f,(pct)=>{$("#upbarI").style.width=pct+"%";});
      archivo_url=r.url; tipo_archivo=r.tipo;
    }
    const stockV=$("#npStock").value.trim();
    await db.crearPlato({nombre,descripcion:$("#npDesc").value.trim()||null,precio:parseFloat($("#npPrecio").value)||0,
      categoria:$("#npCat").value,emoji:$("#npEmoji").value||"🍽️",stock:stockV===""?undefined:parseInt(stockV),
      archivo_url,tipo_archivo});
    platos=(await db.getPlatos({soloActivos:false})).map(mapPlato);
    renderAdmin(); toast("✅ Plato publicado");
  }catch(e){ toast("⚠️ "+(e.message||e)); btn.disabled=false; btn.textContent="+ Publicar plato"; }
}
async function setStock(id,d){ const p=platos.find(x=>x.id===id); if(!p)return; let nv=(p.stock===null?0:p.stock)+d; nv=Math.max(0,nv);
  try{ await db.actualizarPlato(id,{stock:nv}); platos=(await db.getPlatos({soloActivos:false})).map(mapPlato); renderAdmin(); }catch(e){ toast("⚠️ "+(e.message||e)); } }
async function toggleActivo(id,actual){ try{ await db.actualizarPlato(id,{activo:!actual}); platos=(await db.getPlatos({soloActivos:false})).map(mapPlato); renderAdmin(); }catch(e){ toast("⚠️ "+(e.message||e)); } }
async function delPlato(id){ if(!confirm("¿Borrar este plato?"))return; try{ await db.borrarPlato(id); platos=(await db.getPlatos({soloActivos:false})).map(mapPlato); renderAdmin(); toast("🗑️ Eliminado"); }catch(e){ toast("⚠️ "+(e.message||e)); } }

function adminConfig(){
  const origin=(location.origin&&location.origin!=='null')?location.origin:'https://mirestaurante.vercel.app';
  return `<div class="panel"><h3>Datos del restaurante</h3><p class="sub">Aparecen en la vista del cliente y en los mensajes de WhatsApp.</p>
    <label class="fld"><span class="lab">Nombre del restaurante</span><input class="input" id="cfNombre" value="${CONFIG.nombre||''}"></label>
    <label class="fld"><span class="lab">Frase de presentación</span><input class="input" id="cfSub" value="${CONFIG.subtitulo||''}"></label>
    <div class="row2"><label class="fld"><span class="lab">WhatsApp (51XXXXXXXXX)</span><input class="input" id="cfWa" value="${CONFIG.whatsapp||''}"></label>
      <label class="fld"><span class="lab">Capacidad por franja</span><input class="input" id="cfCap" type="number" value="${CONFIG.capacidadPorFranja}"></label></div>
    <div class="row2"><label class="fld"><span class="lab">Número Yape</span><input class="input" id="cfYape" value="${CONFIG.yape||''}"></label>
      <label class="fld"><span class="lab">Número Plin</span><input class="input" id="cfPlin" value="${CONFIG.plin||''}"></label></div>
    <label class="fld"><span class="lab">Titular de la cuenta</span><input class="input" id="cfTit" value="${CONFIG.titularPago||''}"></label>
    <button class="btn btn-primary" id="btnCfg" onclick="saveConfig()">Guardar cambios</button></div>
    <div class="panel"><h3>Código QR del restaurante</h3><p class="sub">Imprímelo en mesas o volantes. Lleva al cliente a tu menú web.</p>
    <div class="qr-area"><div id="qrcode"></div>
      <div style="flex:1;min-width:200px"><label class="fld"><span class="lab">URL de destino del QR</span>
        <input class="input" id="qrUrl" value="${origin}" oninput="genQR()"></label>
        <p style="font-size:12px;color:var(--muted)">Redirección por hora:</p>
        <ul style="list-style:none;font-size:13px;margin-top:6px;display:grid;gap:5px">
        ${configQR.map(q=>`<li>🕐 <b>${q.hora_inicio}–${q.hora_fin}</b> → ${q.descripcion}</li>`).join("")}</ul></div></div></div>`;
}
async function saveConfig(){
  const btn=$("#btnCfg"); btn.disabled=true; btn.textContent="Guardando…";
  try{
    const c=await db.guardarConfig({nombre:$("#cfNombre").value,subtitulo:$("#cfSub").value,
      whatsapp:$("#cfWa").value.replace(/\D/g,''),capacidad_por_franja:parseInt($("#cfCap").value)||4,
      yape:$("#cfYape").value,plin:$("#cfPlin").value,titular_pago:$("#cfTit").value});
    CONFIG=mapConfig(c); renderCliente(); toast("✅ Configuración guardada");
  }catch(e){ toast("⚠️ "+(e.message||e)); }
  finally{ btn.disabled=false; btn.textContent="Guardar cambios"; }
}
function genQR(){ const el=$("#qrcode"); if(!el)return; el.innerHTML="";
  const url=$("#qrUrl")?$("#qrUrl").value:"https://mirestaurante.vercel.app";
  new QRCode(el,{text:url||" ",width:150,height:150,colorDark:"#1a1413",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
}

init();
</script>
</body>
</html>
