<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sabor — Sistema Web del Restaurante</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0a0809;--bg-2:#120d0e;--panel:#1a1413;--panel-2:#221a18;--line:#332724;
    --text:#f5ede6;--muted:#a8978d;--faint:#6f5f57;
    --accent:#e11d2a;--accent-hot:#ff3b4e;--accent-2:#ffb547;
    --green:#34d399;--red:#f87171;--yellow:#fbbf24;--radius:18px;
    --shadow:0 18px 50px -20px rgba(0,0,0,.85);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);
    font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  img{display:block;max-width:100%}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px}

  /* ---------- Topbar ---------- */
  .topbar{position:sticky;top:0;z-index:70;backdrop-filter:blur(14px);background:rgba(10,8,9,.72);border-bottom:1px solid var(--line);transition:background .25s,border-color .25s}
  body.cliente-mode .topbar{position:fixed;left:0;right:0;background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,0));border-bottom-color:transparent;backdrop-filter:none}
  .topbar .wrap{display:flex;align-items:center;gap:14px;height:62px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px;font-size:19px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 16px var(--accent)}
  .brand small{font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  .spacer{flex:1}
  .seg{display:flex;background:rgba(26,20,19,.7);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px}
  .seg button{padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);transition:.18s}
  .seg button.active{background:linear-gradient(135deg,var(--accent),var(--accent-hot));color:#fff}
  .cart-btn{position:relative;width:44px;height:44px;border-radius:12px;background:rgba(26,20,19,.7);border:1px solid var(--line);display:grid;place-items:center;font-size:19px}
  .cart-btn .badge{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:999px;display:grid;place-items:center;padding:0 5px}

  /* ---------- Reels (menú cinematográfico) ---------- */
  .reels-view{position:relative}
  .reels-top{position:fixed;top:62px;left:0;right:0;z-index:65;padding:8px 12px 0;pointer-events:none}
  .reels-top .cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;pointer-events:auto;-webkit-mask:linear-gradient(90deg,#000 88%,transparent)}
  .reels-top .cats::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.42);color:#e9ded6;font-size:12.5px;font-weight:600;transition:.15s;backdrop-filter:blur(6px)}
  .chip.active{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 6px 18px -6px var(--accent)}

  .reels{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .reels::-webkit-scrollbar{display:none}
  .reel{position:relative;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;display:flex;align-items:flex-end;overflow:hidden}
  .reel-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .reel-ph{position:absolute;inset:0;display:grid;place-items:center;font-size:34vw;background:radial-gradient(120% 80% at 50% 20%,#3a1410,#0a0809)}
  .reel-scrim{position:absolute;inset:0;background:
     linear-gradient(to top,rgba(0,0,0,.94) 2%,rgba(0,0,0,.55) 26%,rgba(0,0,0,.05) 52%,rgba(0,0,0,.35) 100%)}
  .reel-info{position:relative;z-index:3;width:100%;padding:0 22px calc(120px + env(safe-area-inset-bottom))}
  .reel-eyebrow{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#fff;background:var(--accent);padding:4px 10px;border-radius:6px;margin-bottom:12px}
  .reel-name{font-family:"Anton",sans-serif;font-weight:400;text-transform:uppercase;line-height:.92;letter-spacing:.5px;font-size:clamp(38px,9.5vw,64px);text-shadow:0 6px 30px rgba(0,0,0,.7)}
  .reel-desc{color:#e7ddd4;font-size:14.5px;line-height:1.55;margin-top:10px;max-width:46ch;text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .reel-actions{display:flex;align-items:center;gap:14px;margin-top:18px}
  .reel-price{font-family:"Anton",sans-serif;font-size:30px;color:var(--accent-2);text-shadow:0 2px 14px rgba(0,0,0,.6);letter-spacing:.5px}
  .reel-add{margin-left:auto;background:linear-gradient(135deg,var(--accent),var(--accent-hot));color:#fff;font-weight:800;font-size:15px;padding:13px 22px;border-radius:14px;box-shadow:0 12px 30px -10px var(--accent);transition:transform .12s,filter .15s}
  .reel-add:active{transform:scale(.95)}
  .reel-add:disabled{background:rgba(255,255,255,.1);color:#9a8;box-shadow:none;cursor:not-allowed}
  .reel-stock{position:absolute;top:118px;right:18px;z-index:3;font-size:11.5px;font-weight:800;padding:6px 11px;border-radius:9px;backdrop-filter:blur(6px);background:rgba(0,0,0,.5)}
  .reel-stock.low{background:rgba(251,191,36,.92);color:#3a2600}
  .reel-stock.out{background:rgba(248,113,113,.92);color:#3a0606}
  .reel-mutehint{position:absolute;top:118px;left:18px;z-index:3;font-size:11px;color:#cbb;background:rgba(0,0,0,.4);padding:5px 9px;border-radius:8px;backdrop-filter:blur(6px);display:flex;gap:5px;align-items:center}

  .swipe-hint{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom));z-index:64;display:flex;flex-direction:column;align-items:center;gap:2px;color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 6px rgba(0,0,0,.7);pointer-events:none;transition:opacity .4s}
  .swipe-hint .chev{font-size:26px;line-height:1;animation:bob 1.4s infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-7px);opacity:1}}
  .reels-empty{position:fixed;inset:0;display:grid;place-content:center;text-align:center;color:var(--muted);gap:8px;padding:40px}
  .reels-empty .ico{font-size:48px}

  /* ---------- Píldora de seguimiento (flotante) ---------- */
  .seg-pill{position:fixed;left:12px;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:80;
    display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:16px;
    background:linear-gradient(135deg,#1c1413,#241312);border:1px solid #4a2a28;
    box-shadow:0 16px 40px -14px rgba(0,0,0,.9);overflow:hidden;max-width:560px;margin:0 auto;text-align:left}
  .seg-pill .sp-ic{font-size:24px;flex:0 0 auto;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  .seg-pill .sp-tx{flex:1;min-width:0}
  .seg-pill .sp-tx b{display:block;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seg-pill .sp-tx small{color:var(--muted);font-size:12px}
  .seg-pill .sp-go{flex:0 0 auto;font-size:13px;font-weight:800;color:var(--accent-2)}
  .seg-pill .sp-bar{position:absolute;left:0;bottom:0;height:3px;width:100%;background:rgba(255,255,255,.08)}
  .seg-pill .sp-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .5s ease}
  .seg-pill .live{position:absolute;top:10px;right:14px;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:liv 1.8s infinite}
  @keyframes liv{0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

  /* ---------- Stepper del seguimiento (dentro del drawer) ---------- */
  .trk-hero{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  .trk-hero .em{font-size:38px}
  .trk-hero b{font-size:18px;display:block}
  .trk-hero span{color:var(--muted);font-size:13px}
  .trk-pago{display:flex;gap:9px;align-items:center;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.32);color:var(--yellow);font-size:12.5px;font-weight:600;padding:10px 13px;border-radius:12px;margin-bottom:16px}
  .steps{position:relative;margin:4px 0 8px;padding-left:6px}
  .step{position:relative;display:flex;gap:14px;padding:0 0 22px 30px}
  .step::before{content:"";position:absolute;left:11px;top:22px;bottom:-2px;width:2px;background:var(--line)}
  .step:last-child::before{display:none}
  .step .node{position:absolute;left:0;top:0;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:var(--bg-2);display:grid;place-items:center;font-size:12px;color:var(--faint);transition:.3s}
  .step .st-tx b{font-size:14.5px;font-weight:700}
  .step .st-tx span{display:block;font-size:12.5px;color:var(--faint)}
  .step.done .node{border-color:var(--green);background:var(--green);color:#04241a}
  .step.done::before{background:var(--green)}
  .step.done .st-tx b{color:var(--text)}
  .step.active .node{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 0 5px rgba(225,29,42,.18);animation:pp 1.6s infinite}
  .step.active .st-tx b{color:var(--accent-2)}
  .step.active .st-tx span{color:var(--muted)}
  @keyframes pp{0%,100%{box-shadow:0 0 0 5px rgba(225,29,42,.18)}50%{box-shadow:0 0 0 9px rgba(225,29,42,.05)}}

  /* ---------- Banner / stories (vista admin reutiliza algunos) ---------- */
  .stories{display:flex;gap:14px;overflow-x:auto;padding:6px 2px 4px;scrollbar-width:none}
  .stories::-webkit-scrollbar{display:none}
  .story{flex:0 0 auto;width:72px;text-align:center}
  .story .ring{width:72px;height:72px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent-2));cursor:pointer}
  .story .ring .face{width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);display:grid;place-items:center;font-size:26px;background:var(--panel-2);overflow:hidden}
  .story .ring .face img,.story .ring .face video{width:100%;height:100%;object-fit:cover}
  .story span{display:block;margin-top:6px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fab-stories{position:fixed;right:14px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:62;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-size:20px;box-shadow:0 12px 30px -8px var(--accent)}

  /* ---------- Drawer / overlay ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;pointer-events:none;transition:.25s}
  .overlay.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,100%);background:var(--bg-2);border-left:1px solid var(--line);z-index:100;transform:translateX(100%);transition:.32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer header{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line)}
  .drawer header h3{font-size:18px;font-weight:800}
  .x{width:36px;height:36px;border-radius:10px;background:var(--panel);display:grid;place-items:center;font-size:18px;color:var(--muted)}
  .drawer .body{flex:1;overflow-y:auto;padding:16px}
  .drawer .foot{padding:16px 18px;border-top:1px solid var(--line);background:var(--bg)}
  .citem{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
  .citem .thumb{width:52px;height:52px;border-radius:12px;background:var(--panel-2);display:grid;place-items:center;font-size:24px;flex:0 0 auto;overflow:hidden}
  .citem .thumb img,.citem .thumb video{width:100%;height:100%;object-fit:cover}
  .citem .ci-info{flex:1;min-width:0}
  .citem .ci-info b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .citem .ci-info span{font-size:12.5px;color:var(--muted)}
  .qty{display:flex;align-items:center;gap:8px}
  .qty button{width:28px;height:28px;border-radius:8px;background:var(--panel);border:1px solid var(--line);font-size:16px;display:grid;place-items:center}
  .qty b{min-width:18px;text-align:center}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .ico{font-size:44px;margin-bottom:10px;opacity:.6}
  label.fld{display:block;margin-bottom:13px}
  label.fld .lab{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
  .input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14.5px;transition:.15s}
  .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(225,29,42,.16)}
  textarea.input{resize:vertical;min-height:64px}
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:4px}
  .slot{padding:10px;border-radius:11px;border:1px solid var(--line);background:var(--panel);text-align:center;font-size:13px;font-weight:600;transition:.15s}
  .slot small{display:block;font-size:10.5px;color:var(--muted);font-weight:500;margin-top:2px}
  .slot.active{border-color:var(--accent);background:rgba(225,29,42,.12);color:var(--accent-2)}
  .slot.full{opacity:.4;cursor:not-allowed;text-decoration:line-through}
  .pay-opts{display:grid;gap:9px;margin-top:4px}
  .pay{display:flex;align-items:center;gap:12px;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--panel);transition:.15s}
  .pay.active{border-color:var(--accent);background:rgba(225,29,42,.1)}
  .pay .logo{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:13px;color:#fff;flex:0 0 auto}
  .pay .logo.yape{background:#742284}.pay .logo.plin{background:#00b3a4}.pay .logo.cash{background:#3f7a3f;font-size:20px}
  .pay .meta{flex:1;text-align:left}.pay .meta b{font-size:14.5px}.pay .meta span{display:block;font-size:12px;color:var(--muted)}
  .pay .chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--line)}
  .pay.active .chk{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px var(--bg-2)}
  #map{height:200px;border-radius:13px;border:1px solid var(--line);margin-top:4px;z-index:1}
  .map-hint{font-size:11.5px;color:var(--faint);margin-top:6px}
  .btn{width:100%;padding:14px;border-radius:13px;font-weight:800;font-size:15px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-hot));color:#fff}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .btn-wa{background:#25d366;color:#042b12}
  .btn-ghost{background:var(--panel);border:1px solid var(--line);color:var(--text)}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .total-row span{color:var(--muted)}.total-row .big{font-size:24px;font-weight:800;color:var(--accent-2)}
  .yape-box{margin-top:4px;background:var(--panel);border:1px dashed var(--accent);border-radius:13px;padding:14px;text-align:center}
  .yape-box .num{font-size:22px;font-weight:900;letter-spacing:1px;color:var(--accent-2);margin:4px 0}
  .yape-box small{color:var(--muted);font-size:12px}

  /* ---------- Admin ---------- */
  .admin-head{padding-top:14px}
  .admin-tabs{display:flex;gap:6px;overflow-x:auto;padding:18px 0 4px;scrollbar-width:none}
  .admin-tabs::-webkit-scrollbar{display:none}
  .atab{flex:0 0 auto;padding:9px 15px;border-radius:11px;background:var(--panel);border:1px solid var(--line);font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap}
  .atab.active{background:var(--accent);color:#fff;border-color:transparent}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px}
  .panel h3{font-size:17px;font-weight:800;margin-bottom:4px}
  .panel .sub{font-size:13px;color:var(--muted);margin-bottom:16px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:9px 10px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.ok{background:rgba(52,211,153,.15);color:var(--green)}.pill.wait{background:rgba(251,191,36,.15);color:var(--yellow)}.pill.no{background:rgba(248,113,113,.15);color:var(--red)}
  .pill.go{background:rgba(96,165,250,.16);color:#93c5fd}
  .mini{padding:6px 11px;border-radius:9px;font-size:12px;font-weight:700}
  .mini.green{background:var(--green);color:#042b12}.mini.red{background:var(--red);color:#3a0606}.mini.ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--muted)}
  .mini.blue{background:#3b82f6;color:#06122e}
  .kanban{display:grid;gap:14px}
  .ocard{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:14px}
  .ocard.s-listo{border-left-color:var(--yellow)}
  .ocard.s-en_camino{border-left-color:#60a5fa}
  .ocard .oc-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .ocard .oc-top b{font-size:15px}
  .ocard .oc-items{font-size:12.5px;color:var(--muted);line-height:1.6}
  .ocard .oc-meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;font-size:12px;color:var(--faint)}
  .ocard .oc-meta a{color:var(--accent-2);text-decoration:none}
  .ocard .oc-actions{display:flex;gap:8px;flex-wrap:wrap}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px}
  .stat .n{font-size:26px;font-weight:800}.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .qr-area{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
  #qrcode{background:#fff;padding:14px;border-radius:14px;width:max-content}
  #qrcode img,#qrcode canvas{display:block}
  .login-card{max-width:380px;margin:90px auto 60px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow)}
  .login-card .ico{font-size:40px;text-align:center;margin-bottom:10px}
  .login-card h2{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}
  .login-card p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:13px 20px;border-radius:13px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.3s;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
  footer{color:var(--faint);font-size:12px;text-align:center;padding:40px 0 50px}
  .loader{text-align:center;padding:60px 20px;color:var(--muted)}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .upbar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:6px}
  .upbar i{display:block;height:100%;width:0;background:var(--accent);transition:.2s}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.05ms!important}}
</style>
</head>
<body class="cliente-mode">

<div class="topbar">
  <div class="wrap">
    <div class="brand"><span class="dot"></span>
      <div><div id="brandName">Sabor</div><small>Menú del día</small></div>
    </div>
    <div class="spacer"></div>
    <div class="seg">
      <button id="navCliente" class="active" onclick="setView('cliente')">Cliente</button>
      <button id="navAdmin" onclick="setView('admin')">Admin</button>
    </div>
    <button class="cart-btn" id="cartBtn" onclick="openCart()">🛒<span class="badge hidden" id="cartBadge">0</span></button>
  </div>
</div>

<!-- VISTA CLIENTE — MENÚ REELS -->
<div id="viewCliente" class="reels-view">
  <div class="reels-top"><div class="cats" id="cats"></div></div>
  <div class="reels" id="reels"><div class="loader"><div class="spin"></div>Cargando menú…</div></div>
  <div class="swipe-hint hidden" id="swipeHint"><span class="chev">⌃</span>Desliza para ver más</div>
  <button class="fab-stories hidden" id="fabStories" onclick="openStories()">✨</button>
</div>

<!-- VISTA ADMIN -->
<div id="viewAdmin" class="hidden">
  <div class="wrap admin-head">
    <div id="adminLogin">
      <div class="login-card">
        <div class="ico">🔐</div>
        <h2>Panel de administración</h2>
        <p>Acceso solo para el equipo del restaurante</p>
        <label class="fld"><span class="lab">Email</span>
          <input class="input" type="email" id="adminEmail" placeholder="tu@correo.com" autocomplete="username"></label>
        <label class="fld"><span class="lab">Contraseña</span>
          <input class="input" type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></label>
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Entrar</button>
      </div>
    </div>
    <div id="adminPanel" class="hidden">
      <div class="admin-tabs" id="adminTabs"></div>
      <div id="adminContent"></div>
      <footer>Panel admin · conectado a Supabase</footer>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <header><h3 id="drawerTitle">Tu pedido</h3><button class="x" onclick="closeDrawer()">✕</button></header>
  <div class="body" id="drawerBody"></div>
  <div class="foot" id="drawerFoot"></div>
</div>

<!-- Píldora de seguimiento -->
<button class="seg-pill hidden" id="segPill" onclick="openTracker()">
  <span class="sp-ic" id="spIc">🍳</span>
  <span class="sp-tx"><b id="spTitle">Tu pedido</b><small id="spSub">Pedido #—</small></span>
  <span class="sp-go">Ver ›</span>
  <span class="live"></span>
  <span class="sp-bar"><i id="spBar"></i></span>
</button>

<div class="toast" id="toast"></div>

<!-- librerías -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- backend -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>

<script>
let CONFIG = { nombre:"Sabor", subtitulo:"", whatsapp:"51999888777", yape:"", plin:"",
  titularPago:"", capacidadPorFranja:4, lat:-12.0651, lng:-75.2049 };
let platos=[], stories=[], configQR=[], pedidos=[];
let carrito=[], catFiltro="todos";
let checkout={franja:null,metodoPago:null,operacion:"",nombre:"",tel:"",lat:null,lng:null,conteo:{}};
let map=null, marker=null, adminLogged=false, adminTab="resumen", rtSub=null;

/* seguimiento del cliente */
let seguimiento=null, segState=null, segTimer=null;
const SEGKEY="sabor_seguimiento";

const $=(s)=>document.querySelector(s);
const money=(n)=>"S/. "+Number(n||0).toFixed(2);
function toast(m){const t=$("#toast");t.innerHTML=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),3000);}
const CATS={todos:"Todos",desayuno:"Desayunos",entrada:"Entradas",almuerzo:"Almuerzos",cena:"Cenas",bebida:"Bebidas",postre:"Postres"};

const mapPlato=(r)=>({id:r.id,nombre:r.nombre,desc:r.descripcion||"",precio:Number(r.precio),categoria:r.categoria,
  emoji:r.emoji||"🍽️",stock:r.stock,activo:r.activo,archivo_url:r.archivo_url,tipo_archivo:r.tipo_archivo});
const mapStory=(r)=>({id:r.id,emoji:r.emoji||"📸",texto:r.texto_descripcion||"",archivo_url:r.archivo_url,tipo_archivo:r.tipo_archivo});
const mapPedido=(r)=>({id:r.id,num:r.numero_pedido,cliente:r.cliente_nombre,tel:r.cliente_telefono,items:r.items||[],
  total:Number(r.total),franja:r.franja_horaria,metodoPago:r.metodo_pago,operacion:r.operacion_pago||"—",
  estadoPago:r.estado_pago,estado:r.estado,lat:r.latitud_entrega,lng:r.longitud_entrega});
function mapConfig(c){return {nombre:c.nombre,subtitulo:c.subtitulo||"",whatsapp:c.whatsapp||"",yape:c.yape||"",
  plin:c.plin||"",titularPago:c.titular_pago||"",capacidadPorFranja:c.capacidad_por_franja||4,
  lat:Number(c.lat)||-12.0651,lng:Number(c.lng)||-75.2049};}

const esVideo=(t)=>t==="mp4"||t==="webm"||t==="mov";
function mediaHTML(url,tipo,fallback){
  if(!url) return `<div class="ph">${fallback||"🍽️"}</div>`;
  if(esVideo(tipo)) return `<video src="${url}" autoplay muted loop playsinline></video>`;
  return `<img src="${url}" alt="" loading="lazy">`;
}
const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function init(){
  restoreSeguimiento();
  try{
    CONFIG = mapConfig(await db.getConfig());
    const [pl,st,qr] = await Promise.all([
      db.getPlatos({soloActivos:false}).then(a=>a.map(mapPlato)),
      db.getStories().then(a=>a.map(mapStory)),
      db.getQR()
    ]);
    platos=pl; stories=st; configQR=qr;
    renderCliente();
    db.escucharPlatos(async ()=>{
      try{
        const ids0=reelIds();
        platos=(await db.getPlatos({soloActivos:false})).map(mapPlato);
        if($("#viewCliente").offsetParent!==null){ if(reelIds()!==ids0)renderReels(); else patchReelStock(); }
      }catch(e){}
    });
    const u = await db.sesionActual(); if(u) adminLogged=true;
  }catch(e){
    console.error(e);
    $("#reels").innerHTML=`<div class="reels-empty"><div class="ico">⚠️</div>No se pudo conectar a la base de datos.<br><span style="font-size:12px">${esc(e.message||e)}</span></div>`;
    toast("⚠️ Error de conexión: "+(e.message||e));
  }
}

/* ============ VISTA CLIENTE (reels) ============ */
function renderCliente(){
  $("#brandName").textContent=(CONFIG.nombre||"Sabor").split(" ")[0];
  $("#fabStories").classList.toggle("hidden",!stories.length);
  const activos=platos.filter(p=>p.activo);
  const cats=Object.keys(CATS).filter(c=>c==="todos"||activos.some(p=>p.categoria===c));
  $("#cats").innerHTML=cats.map(c=>`<button class="chip ${c===catFiltro?'active':''}" onclick="setCat('${c}')">${CATS[c]}</button>`).join("");
  renderReels();
}
function reelIds(){return platos.filter(p=>p.activo&&(catFiltro==="todos"||p.categoria===catFiltro)).map(p=>p.id).join(",");}

let reelObserver=null;
function renderReels(){
  const cont=$("#reels");
  const lista=platos.filter(p=>p.activo&&(catFiltro==="todos"||p.categoria===catFiltro));
  if(!lista.length){
    cont.innerHTML=`<div class="reels-empty"><div class="ico">🍽️</div>Aún no hay platos en esta categoría.</div>`;
    $("#swipeHint").classList.add("hidden"); return;
  }
  cont.innerHTML=lista.map((p,i)=>{
    const agotado=p.stock===0, pocos=p.stock!==null&&p.stock>0&&p.stock<=3;
    let media;
    if(p.archivo_url&&esVideo(p.tipo_archivo))
      media=`<video class="reel-media" src="${p.archivo_url}" muted loop playsinline preload="metadata"></video>
             <div class="reel-mutehint">🔇 video en loop</div>`;
    else if(p.archivo_url)
      media=`<img class="reel-media" src="${p.archivo_url}" alt="${esc(p.nombre)}" loading="lazy">`;
    else media=`<div class="reel-ph">${p.emoji}</div>`;
    const tag=agotado?`<span class="reel-stock out">Agotado</span>`:pocos?`<span class="reel-stock low">Quedan ${p.stock}</span>`:"";
    return `<section class="reel" data-reel="${p.id}">
      ${media}<div class="reel-scrim"></div>${tag}
      <div class="reel-info">
        <span class="reel-eyebrow">${CATS[p.categoria]||p.categoria||'Menú'}</span>
        <h2 class="reel-name">${esc(p.nombre)}</h2>
        ${p.desc?`<p class="reel-desc">${esc(p.desc)}</p>`:""}
        <div class="reel-actions">
          <span class="reel-price">${money(p.precio)}</span>
          <button class="reel-add" data-add="${p.id}" ${agotado?'disabled':''} onclick="addCarrito('${p.id}')">${agotado?'Agotado':'Agregar +'}</button>
        </div>
      </div>
    </section>`;
  }).join("");

  // pista de "desliza" solo si hay más de un plato
  $("#swipeHint").classList.toggle("hidden",lista.length<2);
  cont.scrollTop=0;
  setupReelObserver();
  cont.onscroll=()=>{ if(cont.scrollTop>40){ $("#swipeHint").classList.add("hidden"); cont.onscroll=null; } };
}
function setupReelObserver(){
  if(reelObserver)reelObserver.disconnect();
  reelObserver=new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      const v=en.target.querySelector("video.reel-media");
      if(!v)return;
      if(en.intersectionRatio>=0.6){ v.play().catch(()=>{}); }
      else { v.pause(); }
    });
  },{threshold:[0,0.6,1]});
  document.querySelectorAll("#reels .reel").forEach(r=>reelObserver.observe(r));
}
function patchReelStock(){
  platos.filter(p=>p.activo).forEach(p=>{
    const slide=document.querySelector(`.reel[data-reel="${p.id}"]`); if(!slide)return;
    const agotado=p.stock===0, pocos=p.stock!==null&&p.stock>0&&p.stock<=3;
    slide.querySelectorAll(".reel-stock").forEach(e=>e.remove());
    if(agotado||pocos){const s=document.createElement("span");s.className="reel-stock "+(agotado?"out":"low");s.textContent=agotado?"Agotado":"Quedan "+p.stock;slide.prepend(s);}
    const btn=slide.querySelector(`[data-add="${p.id}"]`);
    if(btn){btn.disabled=agotado;btn.textContent=agotado?"Agotado":"Agregar +";}
  });
}
function setCat(c){catFiltro=c;renderCliente();}

function openStories(){
  if(!stories.length)return;
  $("#drawerTitle").textContent="Novedades de hoy";
  $("#drawerBody").innerHTML=`<div class="stories" style="flex-wrap:wrap">${stories.map(s=>`
    <div class="story"><div class="ring"><div class="face">${s.archivo_url?mediaHTML(s.archivo_url,s.tipo_archivo,s.emoji):s.emoji}</div></div>
    <span>${esc(s.texto||'')}</span></div>`).join("")}</div>`;
  $("#drawerFoot").innerHTML=`<button class="btn btn-ghost" onclick="closeDrawer()">Cerrar</button>`;
  showDrawer();
}

/* ============ CARRITO ============ */
function addCarrito(id){
  const p=platos.find(x=>x.id===id); if(!p)return;
  const ex=carrito.find(x=>x.id===id);
  if(ex)ex.cant++; else carrito.push({id:p.id,nombre:p.nombre,precio:p.precio,emoji:p.emoji,archivo_url:p.archivo_url,tipo_archivo:p.tipo_archivo,cant:1});
  updateCartBadge(); toast(`✅ ${p.nombre} agregado`);
}
function changeQty(id,d){const it=carrito.find(x=>x.id===id);if(!it)return;it.cant+=d;if(it.cant<=0)carrito=carrito.filter(x=>x.id!==id);updateCartBadge();renderCartDrawer();}
const cartTotal=()=>carrito.reduce((s,i)=>s+i.precio*i.cant,0);
const cartCount=()=>carrito.reduce((s,i)=>s+i.cant,0);
function updateCartBadge(){const n=cartCount(),b=$("#cartBadge");b.textContent=n;b.classList.toggle("hidden",n===0);}

function openCart(){renderCartDrawer();showDrawer();}
function showDrawer(){$("#overlay").classList.add("show");$("#drawer").classList.add("show");}
function closeDrawer(){$("#overlay").classList.remove("show");$("#drawer").classList.remove("show");}
function renderCartDrawer(){
  $("#drawerTitle").textContent="Tu pedido";
  if(!carrito.length){
    $("#drawerBody").innerHTML=`<div class="empty"><div class="ico">🛒</div>Tu carrito está vacío.</div>`;
    $("#drawerFoot").innerHTML=`<button class="btn btn-ghost" onclick="closeDrawer()">Seguir viendo</button>`;return;
  }
  $("#drawerBody").innerHTML=carrito.map(i=>`
    <div class="citem"><div class="thumb">${i.archivo_url?mediaHTML(i.archivo_url,i.tipo_archivo,i.emoji):i.emoji}</div>
      <div class="ci-info"><b>${esc(i.nombre)}</b><span>${money(i.precio)} c/u</span></div>
      <div class="qty"><button onclick="changeQty('${i.id}',-1)">−</button><b>${i.cant}</b><button onclick="changeQty('${i.id}',1)">+</button></div>
    </div>`).join("");
  $("#drawerFoot").innerHTML=`<div class="total-row"><span>Total</span><span class="big">${money(cartTotal())}</span></div>
    <button class="btn btn-primary" onclick="goCheckout()">Continuar al pedido →</button>`;
}

/* ============ CHECKOUT ============ */
function generarFranjas(conteo){
  const out=[];
  for(let h=12;h<21;h++)for(let m=0;m<60;m+=15){
    const ini=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    let m2=m+15,h2=h; if(m2>=60){m2=0;h2=h+1;}
    const fin=`${String(h2).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
    const etq=`${ini}-${fin}`, ocup=conteo[etq]||0;
    out.push({etq,ini,ocup,lleno:ocup>=CONFIG.capacidadPorFranja});
  }
  return out;
}
async function goCheckout(){
  $("#drawerTitle").textContent="Finalizar pedido";
  $("#drawerBody").innerHTML=`<div class="loader"><div class="spin"></div>Cargando franjas…</div>`;
  $("#drawerFoot").innerHTML="";
  try{ checkout.conteo=await db.ocupacionFranjas(); }catch(e){ checkout.conteo={}; }
  const franjas=generarFranjas(checkout.conteo);
  $("#drawerBody").innerHTML=`
    <label class="fld"><span class="lab">Tu nombre</span>
      <input class="input" id="ckNombre" placeholder="Ej: Ana Quispe" value="${esc(checkout.nombre)}" oninput="checkout.nombre=this.value;validarCheckout()"></label>
    <label class="fld"><span class="lab">WhatsApp / teléfono</span>
      <input class="input" id="ckTel" inputmode="numeric" placeholder="987654321" value="${esc(checkout.tel)}" oninput="checkout.tel=this.value;validarCheckout()"></label>
    <span class="lab">Franja horaria de entrega</span>
    <div class="slots" id="ckSlots">${franjas.map(f=>`
      <button class="slot ${f.lleno?'full':''} ${checkout.franja===f.etq?'active':''}" ${f.lleno?'disabled':''} onclick="pickSlot('${f.etq}')">
        ${f.ini}<small>${f.lleno?'lleno':`${CONFIG.capacidadPorFranja-f.ocup} libres`}</small></button>`).join("")}</div>
    <span class="lab" style="margin-top:16px">Ubicación de entrega</span>
    <div id="map"></div>
    <div class="map-hint">📍 Arrastra el pin a tu dirección exacta. Se guardan las coordenadas GPS.</div>
    <span class="lab" style="margin-top:16px">Método de pago</span>
    <div class="pay-opts">
      ${payOpt('yape','Yape','Pago con QR · confirmación con N° de operación','yape')}
      ${payOpt('plin','Plin','Pago con QR · confirmación con N° de operación','plin')}
      ${payOpt('efectivo','Efectivo','Pagas contra entrega al repartidor','cash','💵')}
    </div><div id="payDetail"></div>`;
  $("#drawerFoot").innerHTML=`<div class="total-row"><span>Total a pagar</span><span class="big">${money(cartTotal())}</span></div>
    <button class="btn btn-primary" id="btnConfirmar" disabled onclick="confirmarPedido()">Confirmar pedido</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="renderCartDrawer()">← Volver al carrito</button>`;
  setTimeout(initMap,80); renderPayDetail(); validarCheckout();
}
function payOpt(val,nombre,sub,cls,emoji){
  return `<button class="pay ${checkout.metodoPago===val?'active':''}" onclick="pickPago('${val}',event)">
    <div class="logo ${cls}">${emoji||nombre.slice(0,2)}</div>
    <div class="meta"><b>${nombre}</b><span>${sub}</span></div><div class="chk"></div></button>`;
}
function pickSlot(e){checkout.franja=e;document.querySelectorAll('#ckSlots .slot').forEach(b=>b.classList.toggle('active',b.textContent.trim().startsWith(e.split('-')[0])));validarCheckout();}
function pickPago(v,ev){checkout.metodoPago=v;document.querySelectorAll('.pay').forEach(p=>p.classList.remove('active'));ev.currentTarget.classList.add('active');renderPayDetail();validarCheckout();}
function renderPayDetail(){
  const d=$("#payDetail"); if(!d)return;
  if(checkout.metodoPago==='yape'||checkout.metodoPago==='plin'){
    const num=checkout.metodoPago==='yape'?CONFIG.yape:CONFIG.plin, nom=checkout.metodoPago==='yape'?'Yape':'Plin';
    d.innerHTML=`<div class="yape-box"><small>Yapea / Plinea al número del restaurante</small>
      <div class="num">${num||'—'}</div><small>${esc(CONFIG.titularPago||'')} · ${money(cartTotal())}</small></div>
      <label class="fld" style="margin-top:12px"><span class="lab">N° de operación de ${nom} *</span>
        <input class="input" id="ckOp" inputmode="numeric" placeholder="Ej: 00481234" value="${esc(checkout.operacion)}" oninput="checkout.operacion=this.value;validarCheckout()"></label>
      <p style="font-size:11.5px;color:var(--faint);margin-top:-6px">El restaurante verificará este código antes de preparar tu pedido.</p>`;
  }else{d.innerHTML="";checkout.operacion="";}
}
function validarCheckout(){
  const b=$("#btnConfirmar"); if(!b)return;
  const base=checkout.nombre.trim()&&checkout.tel.trim().length>=6&&checkout.franja&&checkout.metodoPago&&checkout.lat;
  const pago=checkout.metodoPago==='efectivo'||checkout.operacion.trim().length>=4;
  b.disabled=!(base&&pago);
}
function initMap(){
  if(!$("#map"))return; if(map){map.remove();map=null;}
  const lat=checkout.lat||CONFIG.lat,lng=checkout.lng||CONFIG.lng;
  map=L.map('map',{attributionControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  marker=L.marker([lat,lng],{draggable:true}).addTo(map);
  const set=(ll)=>{checkout.lat=ll.lat;checkout.lng=ll.lng;validarCheckout();};
  set(marker.getLatLng());
  marker.on('dragend',()=>set(marker.getLatLng()));
  map.on('click',(e)=>{marker.setLatLng(e.latlng);set(e.latlng);});
  setTimeout(()=>map.invalidateSize(),120);
}
async function confirmarPedido(){
  const btn=$("#btnConfirmar"); btn.disabled=true; btn.textContent="Enviando…";
  try{
    const items=carrito.map(i=>({nombre:i.nombre,cant:i.cant,precio:i.precio}));
    const ped=await db.crearPedido({
      nombre:checkout.nombre,tel:checkout.tel,items,total:cartTotal(),
      franja:checkout.franja,lat:checkout.lat,lng:checkout.lng,
      metodoPago:checkout.metodoPago,operacion:checkout.operacion||null
    });
    const pedUI=mapPedido(Array.isArray(ped)?ped[0]:ped);
    iniciarSeguimiento(pedUI);     // ← guarda en el dispositivo (sobrevive recargas)
    abrirWhatsApp(pedUI);
    carrito=[];updateCartBadge();
    checkout={franja:null,metodoPago:null,operacion:"",nombre:"",tel:"",lat:null,lng:null,conteo:{}};
    openTracker();                  // ← muestra el seguimiento en vivo
  }catch(e){
    toast("⚠️ "+(e.message||e)); btn.disabled=false; btn.textContent="Confirmar pedido";
  }
}
function abrirWhatsApp(ped){
  const maps=`https://www.google.com/maps?q=${ped.lat},${ped.lng}`;
  const pago=ped.metodoPago==='efectivo'?"Pago: Efectivo contra entrega":`Pago: ${ped.metodoPago.toUpperCase()} · Op. N° ${ped.operacion} (por verificar)`;
  let t=`*NUEVO PEDIDO #${ped.num}*\n\n`;
  ped.items.forEach(i=>{t+=`${i.cant}x ${i.nombre} - ${money(i.precio*i.cant)}\n`;});
  t+=`\nHora de entrega: ${ped.franja}\nCliente: ${ped.cliente} (${ped.tel})\n${pago}\nUbicación: ${maps}\n\n*Total: ${money(ped.total)}*`;
  window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(t)}`,"_blank");
}

/* ============ SEGUIMIENTO DEL CLIENTE (persistente) ============ */
const SEG_STEPS=[
  {k:'pendiente', t:'Pedido recibido', s:'Llegó tu pedido a la cocina', ic:'📝'},
  {k:'preparando',t:'Preparando',      s:'La cocina está en ello',      ic:'🍳'},
  {k:'listo',     t:'Listo para salir',s:'Empacado y a punto',          ic:'✅'},
  {k:'en_camino', t:'En camino',       s:'El repartidor va hacia ti',   ic:'🛵'},
  {k:'entregado', t:'Entregado',       s:'¡Buen provecho! 🎉',          ic:'🎉'},
];
const segIdx=(e)=>{const m={pendiente:0,preparando:1,listo:2,en_camino:3,entregado:4};return e in m?m[e]:0;};

function loadSeg(){try{return JSON.parse(localStorage.getItem(SEGKEY)||"null");}catch(e){return null;}}
function saveSeg(o){try{localStorage.setItem(SEGKEY,JSON.stringify(o));}catch(e){}}
function clearSeg(){try{localStorage.removeItem(SEGKEY);}catch(e){} seguimiento=null;segState=null;stopPoll();$("#segPill").classList.add("hidden");}

function iniciarSeguimiento(ped){
  seguimiento={id:ped.id,num:ped.num,total:ped.total,franja:ped.franja,metodo:ped.metodoPago,ts:Date.now()};
  saveSeg(seguimiento);
  segState={estado:ped.estado||'pendiente',estado_pago:ped.estadoPago||'pendiente',num:ped.num,franja:ped.franja};
  pintarPill(); startPoll();
}
function restoreSeguimiento(){
  const s=loadSeg(); if(!s||!s.id)return;
  if(Date.now()-(s.ts||0) > 8*3600*1000){ clearSeg(); return; }  // expira tras 8h
  seguimiento=s;
  segState={estado:'pendiente',estado_pago:null,num:s.num,franja:s.franja};
  pintarPill(); pollSeguimiento(); startPoll();
}
function startPoll(){ stopPoll(); segTimer=setInterval(pollSeguimiento,12000); }
function stopPoll(){ if(segTimer){clearInterval(segTimer);segTimer=null;} }

async function pollSeguimiento(){
  if(!seguimiento||!db.sb)return;
  try{
    const {data,error}=await db.sb.rpc("seguir_pedido",{p_id:seguimiento.id});
    if(error)throw error;
    const row=Array.isArray(data)?data[0]:data;
    if(!row)return;
    segState={estado:row.estado,estado_pago:row.estado_pago,num:row.numero_pedido,franja:row.franja_horaria};
    pintarPill();
    if($("#trkRoot"))renderTracker();
  }catch(e){ /* silencioso: si falla la red, reintenta al próximo ciclo */ }
}
function pintarPill(){
  if(!segState)return;
  const idx=segIdx(segState.estado), step=SEG_STEPS[idx];
  $("#segPill").classList.remove("hidden");
  $("#spIc").textContent=step.ic;
  $("#spTitle").textContent=step.t;
  $("#spSub").textContent=`Pedido #${segState.num||seguimiento.num||'—'} · ${segState.franja||''}`;
  $("#spBar").style.width=((idx+1)/SEG_STEPS.length*100)+"%";
  // ocultar la pista de "desliza" para no chocar con la píldora
  $("#swipeHint")&&$("#swipeHint").classList.add("hidden");
}
function openTracker(){ renderTracker(); showDrawer(); }
function renderTracker(){
  if(!segState&&seguimiento)segState={estado:'pendiente',num:seguimiento.num,franja:seguimiento.franja};
  if(!segState)return;
  const idx=segIdx(segState.estado), cur=SEG_STEPS[idx];
  const entregado=segState.estado==='entregado';
  const pagoPend=segState.estado_pago==='pendiente'&&seguimiento&&seguimiento.metodo!=='efectivo';
  $("#drawerTitle").textContent="Seguimiento del pedido";
  $("#drawerBody").innerHTML=`<div id="trkRoot">
    <div class="trk-hero"><div class="em">${cur.ic}</div>
      <div><b>${cur.t}</b><span>Pedido #${segState.num||'—'} · entrega ${segState.franja||'—'}</span></div></div>
    ${pagoPend?`<div class="trk-pago">⏳ Esperando que el restaurante confirme tu pago ${seguimiento.metodo?('('+seguimiento.metodo.toUpperCase()+')'):''}.</div>`:""}
    <div class="steps">
      ${SEG_STEPS.map((st,i)=>{
        const cls=i<idx?'done':i===idx?'active':'';
        const node=i<idx?'✓':st.ic;
        return `<div class="step ${cls}"><div class="node">${node}</div>
          <div class="st-tx"><b>${st.t}</b><span>${st.s}</span></div></div>`;
      }).join("")}
    </div>
    <p style="font-size:12px;color:var(--faint);text-align:center;margin-top:6px">Se actualiza solo. Puedes cerrar la página y volver: tu pedido seguirá aquí.</p>
  </div>`;
  const waMsg=encodeURIComponent(`Hola, consulto por mi pedido #${segState.num||''}`);
  $("#drawerFoot").innerHTML=`
    <a class="btn btn-wa" href="https://wa.me/${CONFIG.whatsapp}?text=${waMsg}" target="_blank" rel="noopener">Escribir al restaurante 📲</a>
    ${entregado
      ? `<button class="btn btn-primary" style="margin-top:8px" onclick="finalizarSeguimiento()">Recibí mi pedido ✓</button>`
      : `<button class="btn btn-ghost" style="margin-top:8px" onclick="closeDrawer()">Cerrar</button>`}`;
}
function finalizarSeguimiento(){ clearSeg(); closeDrawer(); toast("¡Gracias! 🎉 Que lo disfrutes."); }

window.addEventListener("focus",pollSeguimiento);

async function doLogin(){

function adminCocina(){
  const lista=pedidos.filter(p=>p.estado==='pendiente'||p.estado==='preparando');
  return `<div class="panel"><h3>🍳 Cocina</h3><p class="sub">Prepara los pedidos y márcalos como listos. Lo que marques aquí, el cliente lo ve al instante.</p>

      if(p.estado==='pendiente')acc+=`<button class="mini blue" onclick="avanzar('${p.id}','pendiente')">▶ Empezar a preparar</button>`;
      if(p.estado==='preparando')acc+=`<button class="mini green" onclick="avanzar('${p.id}','preparando')">✓ Marcar listo</button>`;

function adminReparto(){
  const lista=pedidos.filter(p=>p.estado==='listo'||p.estado==='en_camino');

async function avanzar(id,estado){

  try{ await db.setEstadoPedido(id,flujo[estado]); pedidos=(await db.getPedidos()).map(mapPedido); renderAdmin(); }
  catch(e){
    const m=(e.message||e)+"";
    if(/check|constraint|en_camino/i.test(m)) toast("⚠️ Falta habilitar 'en_camino' en la BD. Revisa seguimiento.sql.");

  }
}

async function addPlato(){
  const nombre=$("#npNombre").value.trim(); if(!nombre)return toast("Falta el nombre");
  const btn=$("#btnAddPlato"); btn.disabled=true; btn.textContent="Publicando…";
  try{
    let archivo_url=null,tipo_archivo=null;
    const f=$("#npFile").files[0];
    if(f){
      $("#upbar").style.display="block";
      const r=await db.subirMedia(f,(pct)=>{$("#upbarI").style.width=pct+"%";});
      archivo_url=r.url; tipo_archivo=r.tipo;
    }
    const stockV=$("#npStock").value.trim();
    await db.crearPlato({nombre,descripcion:$("#npDesc").value.trim()||null,precio:parseFloat($("#npPrecio").value)||0,
      categoria:$("#npCat").value,emoji:$("#npEmoji").value||"🍽️",stock:stockV===""?undefined:parseInt(stockV),
      archivo_url,tipo_archivo});
    platos=(await db.getPlatos({soloActivos:false})).map(mapPlato);
    renderAdmin(); toast("✅ Plato publicado");
  }catch(e){ toast("⚠️ "+(e.message||e)); btn.disabled=false; btn.textContent="+ Publicar plato"; }
}
async function setStock(id,d){ const p=platos.find(x=>x.id===id); if(!p)return; let nv=(p.stock===null?0:p.stock)+d; nv=Math.max(0,nv);
  try{ await db.actualizarPlato(id,{stock:nv}); platos=(await db.getPlatos({soloActivos:false})).map(mapPlato); renderAdmin(); }catch(e){ toast("⚠️ "+(e.message||e)); } }
async function toggleActivo(id,actual){ try{ await db.actualizarPlato(id,{activo:!actual}); platos=(await db.getPlatos({soloActivos:false})).map(mapPlato); renderAdmin(); }catch(e){ toast("⚠️ "+(e.message||e)); } }
async function delPlato(id){ if(!confirm("¿Borrar este plato?"))return; try{ await db.borrarPlato(id); platos=(await db.getPlatos({soloActivos:false})).map(mapPlato); renderAdmin(); toast("🗑️ Eliminado"); }catch(e){ toast("⚠️ "+(e.message||e)); } }

async function saveConfig(){
  const btn=$("#btnCfg"); btn.disabled=true; btn.textContent="Guardando…";
  try{
    const c=await db.guardarConfig({nombre:$("#cfNombre").value,subtitulo:$("#cfSub").value,
      whatsapp:$("#cfWa").value.replace(/\D/g,''),capacidad_por_franja:parseInt($("#cfCap").value)||4,
      yape:$("#cfYape").value,plin:$("#cfPlin").value,titular_pago:$("#cfTit").value});
    CONFIG=mapConfig(c); renderCliente(); toast("✅ Configuración guardada");
  }catch(e){ toast("⚠️ "+(e.message||e)); }
  finally{ btn.disabled=false; btn.textContent="Guardar cambios"; }
}
function genQR(){ const el=$("#qrcode"); if(!el)return; el.innerHTML="";
  const url=$("#qrUrl")?$("#qrUrl").value:"https://mirestaurante.vercel.app";
  new QRCode(el,{text:url||" ",width:150,height:150,colorDark:"#1a1413",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
}

init();
</script>
